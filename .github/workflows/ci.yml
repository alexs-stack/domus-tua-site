name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest

    env:
      # Safe placeholder values so the build never fails in CI.
      # Real values are configured in Vercel (which owns deploy).
      NEXT_PUBLIC_SITE_URL: https://example.com
      NEXT_PUBLIC_USE_REALSMART: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
